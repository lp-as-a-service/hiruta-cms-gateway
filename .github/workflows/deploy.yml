name: Deploy Gateway

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - '**/*.md'
      - 'tests/**'
  workflow_dispatch: {}

concurrency:
  group: deploy-gateway
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify production deployment
        run: |
          set -e
          echo "Waiting for propagation..."
          sleep 10

          echo "--- Check: /auth is responsive ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://cms.hiruta-studio.com/auth?redirect=https://hiruta-studio.com/admin/")
          case "$STATUS" in
            200|302|303)
              echo "✅ /auth status=$STATUS"
              ;;
            *)
              echo "❌ /auth unexpected status=$STATUS"
              exit 1
              ;;
          esac

          echo "--- Check: /auth returns HTML with login form ---"
          BODY=$(curl -sSf "https://cms.hiruta-studio.com/auth?redirect=https://hiruta-studio.com/admin/")
          echo "$BODY" | grep -qi "email" || { echo "❌ /auth body missing email field"; exit 1; }
          echo "✅ /auth renders login form"

          echo "--- All verifications passed ---"
