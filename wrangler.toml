name = "hiruta-cms-gateway"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# カスタムドメイン
routes = [
  { pattern = "cms.hiruta-studio.com", custom_domain = true }
]

[vars]
GITHUB_REPO = "lp-as-a-service/hiruta-lp-astro"
GITHUB_BRANCH = "main"

# KV Namespace: 招待トークン・ユーザー管理
[[kv_namespaces]]
binding = "HIRUTA_STUDIO_AUTH"
id = "345304590d7b4ae1911cec75e500861d"

# KV Namespace: 顧客別画像アップロード容量quota管理
[[kv_namespaces]]
binding = "HIRUTA_QUOTA"
id = "7e68469628644a01855124fdb28530aa"

# Secrets（wrangler secret put で設定、ソースには含めない）:
#   GITHUB_TOKEN      - 管理者の GitHub PAT（repo権限が必要）
#   SESSION_SECRET    - HMAC署名用シークレット（32文字以上の乱数）
#   MASTER_EMAIL      - マスター管理者メールアドレス（例: kazu12127823@gmail.com）
#   RESEND_API_KEY    - Resend API key（re_xxx）
#
# 廃止済み:
#   ALLOWED_EMAILS    - KV ベースの認可に移行したため不要
